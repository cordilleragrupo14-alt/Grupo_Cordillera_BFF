# Servidor
server.port=8080
spring.application.name=bff-cordillera

# URLs de los microservicios
ms.datos.url=${MS_DATOS_URL:http://localhost:8081}
ms.kpi.url=${MS_KPI_URL:http://localhost:8082}

# CRITICO: habilitar Circuit Breaker para Feign (sin esto el fallback nunca se activa)
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker - Resilience4j
resilience4j.circuitbreaker.instances.datos.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.datos.slidingWindowSize=10
resilience4j.circuitbreaker.instances.datos.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.datos.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.datos.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.datos.failureRateThreshold=50

resilience4j.circuitbreaker.instances.kpi.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.kpi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.kpi.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.kpi.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.kpi.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.kpi.failureRateThreshold=50

# Logs
logging.level.cl.cordillera=DEBUG
